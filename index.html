<!DOCTYPE html>
<html>
    <head>
        <title>A Meaningful Page Title</title>
        <script src="./script.js" defer></script>
        <link rel="stylesheet" href="assigner.css">
    </head>


    <body>

        <div id="main">

            <div id="numDiv">
                How many lines are there:
                <input id="linesNo" oninput=""></input>
            </div>

            <div id="menuBar">
                Agent names, one per line:
                <textarea id="from" oninput="assign()"></textarea>
            </div>
            

            <div id="options">
                Work assignments:
                <textarea id="to"></textarea>
            </div>
            
        </div>

    </body>
</html>
